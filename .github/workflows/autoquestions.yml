name: AutoQuestions Loop

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one mutation cycle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py

      - name: Commit and push results
        env:
          CYCLE_TS: ${{ github.run_id }}
        run: |
          git config user.name "autoquestions-bot"
          git config user.email "bot@autoquestions.dev"
          git add questions.json results.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit (discard cycle)"
          else
            git commit -m "cycle: run-${CYCLE_TS}"
            git push
          fi
